  .thumb-wrap.svg-thumb { background: #e8e8e8; }

  .meta { min-width: 0; }
  .filename { font-size: 12px; font-weight: 600; font-family: 'SF Mono', Monaco, monospace; color: #333; word-break: break-all; }

  .usage-tag.unused { background: #fde8e8; color: #b33; }
  .usage-tag.design { background: #fff3d6; color: #8a6d00; }
  .used-in { font-size: 11px; color: #666; margin-top: 2px; }
  .used-in code { background: #f0f0f0; padding: 1px 4px; font-size: 10px; border-radius: 2px; }

  .note-field textarea:focus { outline: none; border-color: #888; }

  .legend .dot { width: 10px; height: 10px; border-radius: 2px; }

function render() {
  const container = document.getElementById('content');
  let html = '';
  let imgIdx = 0;

  for (const world of DATA) {
    const totalImages = world.sections.reduce((sum, s) => sum + s.images.length, 0);
    html += `<div class="world-section">`;
    html += `<div class="world-header">${world.world} <span class="badge">${totalImages} images</span></div>`;

    for (const section of world.sections) {
      html += `<div class="subsection">`;
      html += `<div class="subsection-header ${section.type}">${section.label} (${section.images.length})</div>`;
      html += `<div class="image-grid">`;

      for (const img of section.images) {
        const isAsset = img.path.startsWith('assets/');
        const imgSrc = `${BASE}/${img.path}`;
        const tagClass = img.usedIn ? 'used' : isAsset ? 'design' : 'unused';
        const tagText = img.usedIn ? 'USED' : isAsset ? 'DESIGN ASSET' : 'UNUSED';
        const thumbClass = img.isSvg ? 'thumb-wrap svg-thumb' : 'thumb-wrap';

        html += `<div class="image-card">`;
        html += `<div class="${thumbClass}"><img src="${imgSrc}" alt="${img.file}" loading="lazy" onerror="this.parentElement.innerHTML='<span style=\\'color:#999;font-size:11px\\'>Failed to load</span>'"></div>`;
        html += `<div class="meta">`;
        html += `<div class="filename">${img.file}</div>`;
        html += `<div class="filepath">${img.path}${img.size ? ' (' + img.size + ')' : ''}</div>`;
        html += `<span class="usage-tag ${tagClass}">${tagText}</span>`;
        if (img.usedIn) html += `<div class="used-in">Used in: <code>${img.usedIn}</code></div>`;
        if (img.note && !img.usedIn) html += `<div class="used-in">${img.note}</div>`;
        html += `</div>`;
        html += `<div class="note-field"><textarea data-idx="${imgIdx}" data-file="${img.file}" data-path="${img.path}" data-world="${world.world}" placeholder="Notes..." oninput="updateCount()"></textarea></div>`;
        html += `</div>`;
        imgIdx++;
      }

      html += `</div></div>`;
    }

    html += `</div>`;
  }

  container.innerHTML = html;
}

function updateCount() {
  const textareas = document.querySelectorAll('textarea');
  let count = 0;
  textareas.forEach(t => { if (t.value.trim()) count++; });
  document.getElementById('noteCount').textContent = count + ' note' + (count !== 1 ? 's' : '');
}

function copyNotes() {
  const textareas = document.querySelectorAll('textarea');
  let lines = [];
  let currentWorld = '';

  textareas.forEach(t => {
    if (!t.value.trim()) return;
    const world = t.dataset.world;
    if (world !== currentWorld) {
      if (lines.length > 0) lines.push('');
      lines.push('## ' + world);
      currentWorld = world;
    }
    lines.push(`- **${t.dataset.file}** (${t.dataset.path}): ${t.value.trim()}`);
  });

  if (lines.length === 0) {
    document.getElementById('copyStatus').textContent = 'No notes to copy';
    setTimeout(() => document.getElementById('copyStatus').textContent = '', 2000);
    return;
  }

  const text = '# Image Audit Notes\n\n' + lines.join('\n');
  navigator.clipboard.writeText(text).then(() => {
    document.getElementById('copyStatus').textContent = 'Copied!';
    setTimeout(() => document.getElementById('copyStatus').textContent = '', 2000);
  });
}

render();
</script>
