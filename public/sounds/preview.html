<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sound Preview</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #fafaf8; color: #1a1a1a; padding: 32px; max-width: 900px; margin: 0 auto; }
  h1 { font-size: 24px; font-weight: 600; margin-bottom: 32px; }
  h2 { font-size: 16px; font-weight: 600; margin: 24px 0 12px; padding: 8px 12px; background: #f0f0ec; border-left: 3px solid #D64C00; }
  .row { display: flex; align-items: center; gap: 12px; padding: 6px 12px; border-bottom: 1px solid #eee; }
  .row:hover { background: #f8f8f5; }
  button { width: 32px; height: 32px; border: 1px solid #ccc; background: #fff; border-radius: 2px; cursor: pointer; font-size: 14px; flex-shrink: 0; }
  button:hover { background: #f0f0ec; border-color: #999; }
  button:active { background: #e0e0dc; }
  button.playing { background: #D64C00; color: #fff; border-color: #D64C00; }
  .name { font-size: 13px; font-family: 'SF Mono', 'Fira Code', monospace; color: #555; flex: 1; }
  .event { font-size: 12px; color: #999; min-width: 120px; text-align: right; }
  .size { font-size: 11px; color: #bbb; min-width: 50px; text-align: right; }
</style>
</head>
<body>
<h1>Sound Preview</h1>

<div id="sounds"></div>

<script>
const worlds = [
  {
    name: 'Mario',
    sounds: [
      { file: 'mario/mario-coin.wav', event: 'selection' },
      { file: 'mario/mario-1up.wav', event: 'skillUnlock' },
      { file: 'mario/mario-powerup.wav', event: 'demoComplete' },
      { file: 'mario/mario-flagpole.wav', event: 'victory' },
    ]
  },
  {
    name: 'Red Alert',
    sounds: [
      { file: 'red-alert/affirmative.mp3', event: 'demoStart' },
      { file: 'red-alert/yes-sir.wav', event: 'demoStart (alt)' },
      { file: 'red-alert/acknowledged.mp3', event: 'selection' },
      { file: 'red-alert/mission-sir.mp3', event: 'demoComplete' },
      { file: 'red-alert/chaching.mp3', event: 'victory' },
      { file: 'red-alert/too-easy.wav', event: 'levelComplete' },
      { file: 'red-alert/rolling.wav', event: 'transition' },
      { file: 'red-alert/agent-ready.mp3', event: 'spare' },
      { file: 'red-alert/awaiting-orders.mp3', event: 'spare' },
      { file: 'red-alert/commander.mp3', event: 'spare' },
      { file: 'red-alert/it-will-be-done.wav', event: 'spare' },
      { file: 'red-alert/obtaining-intelligence.mp3', event: 'spare' },
    ]
  },
  {
    name: 'Zelda',
    sounds: [
      { file: 'zelda/zelda-item-get.wav', event: 'skillUnlock' },
      { file: 'zelda/zelda-chest-open.mp3', event: 'demoComplete' },
      { file: 'zelda/zelda-secret.wav', event: 'levelComplete' },
      { file: 'zelda/zelda-heart.wav', event: 'badgeEarned' },
    ]
  },
  {
    name: 'Tetris',
    sounds: [
      { file: 'tetris/line-clear.mp3', event: 'levelComplete' },
      { file: 'tetris/success.mp3', event: 'demoComplete' },
      { file: 'tetris/game-over.mp3', event: 'retry' },
      { file: 'tetris/korobeiniki-short.mp3', event: 'skillUnlock' },
      { file: 'tetris/korobeiniki.mp3', event: 'victory' },
    ]
  },
  {
    name: 'Elder Scrolls',
    sounds: [
      { file: 'elder-scrolls/skill-increase.mp3', event: 'levelComplete' },
      { file: 'elder-scrolls/discovery.mp3', event: 'demoStart' },
      { file: 'elder-scrolls/quest-complete.mp3', event: 'demoComplete' },
      { file: 'elder-scrolls/skill-level-up.mp3', event: 'skillUnlock' },
      { file: 'elder-scrolls/skyrim-levelup.mp3', event: 'victory' },
    ]
  },
  {
    name: 'Clair Obscur',
    sounds: [
      { file: 'clair-obscur/lumiere-intro.mp3', event: 'demoStart' },
      { file: 'clair-obscur/music-box.mp3', event: 'skillUnlock' },
      { file: 'clair-obscur/title-theme.mp3', event: 'demoComplete' },
      { file: 'clair-obscur/getup-lumiere.mp3', event: 'victory' },
      { file: 'clair-obscur/alicia.mp3', event: 'pick your fave' },
      { file: 'clair-obscur/lune.mp3', event: 'pick your fave' },
      { file: 'clair-obscur/sciel.mp3', event: 'pick your fave' },
      { file: 'clair-obscur/paintress.mp3', event: 'pick your fave' },
      { file: 'clair-obscur/contre-le-coeur.mp3', event: 'pick your fave' },
      { file: 'clair-obscur/clea.mp3', event: 'pick your fave' },
      { file: 'clair-obscur/dualliste.mp3', event: 'pick your fave' },
      { file: 'clair-obscur/beneath-blue-tree.mp3', event: 'pick your fave' },
      { file: 'clair-obscur/battling-breeze.mp3', event: 'pick your fave' },
      { file: 'clair-obscur/numbers-the-hours.mp3', event: 'pick your fave' },
    ]
  },
];

let currentAudio = null;
let currentBtn = null;

function play(btn, file) {
  if (currentAudio) {
    currentAudio.pause();
    currentAudio.currentTime = 0;
    if (currentBtn) currentBtn.classList.remove('playing');
    if (currentBtn === btn) { currentBtn = null; currentAudio = null; return; }
  }
  const audio = new Audio(file);
  audio.play();
  btn.classList.add('playing');
  btn.textContent = '\u25A0';
  currentAudio = audio;
  currentBtn = btn;
  audio.onended = () => { btn.classList.remove('playing'); btn.textContent = '\u25B6'; currentAudio = null; currentBtn = null; };
}

const container = document.getElementById('sounds');
for (const world of worlds) {
  const h2 = document.createElement('h2');
  h2.textContent = world.name;
  container.appendChild(h2);
  for (const s of world.sounds) {
    const row = document.createElement('div');
    row.className = 'row';
    const btn = document.createElement('button');
    btn.textContent = '\u25B6';
    btn.onclick = () => play(btn, s.file);
    const name = document.createElement('span');
    name.className = 'name';
    name.textContent = s.file;
    const ev = document.createElement('span');
    ev.className = 'event';
    ev.textContent = s.event;
    row.appendChild(btn);
    row.appendChild(name);
    row.appendChild(ev);
    container.appendChild(row);
  }
}
</script>
</body>
</html>
